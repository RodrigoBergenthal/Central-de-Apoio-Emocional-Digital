<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diário de Emoções</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>📝 Diário de Emoções</h1>
        <p>Registre como você está se sentindo hoje e acompanhe sua jornada emocional</p>
    </header>

    <main>
        <section class="emotion-journal">
            <h2>Como você está se sentindo hoje?</h2>
            <div class="emotion-selector">
                <div class="emotion-option" data-emotion="feliz">
                    <span class="emoji">😊</span>
                    <p>Feliz</p>
                </div>
                <div class="emotion-option" data-emotion="triste">
                    <span class="emoji">😢</span>
                    <p>Triste</p>
                </div>
                <div class="emotion-option" data-emotion="ansioso">
                    <span class="emoji">😰</span>
                    <p>Ansioso</p>
                </div>
                <div class="emotion-option" data-emotion="calmo">
                    <span class="emoji">😌</span>
                    <p>Calmo</p>
                </div>
                <div class="emotion-option" data-emotion="irritado">
                    <span class="emoji">😠</span>
                    <p>Irritado</p>
                </div>
                <div class="emotion-option" data-emotion="confuso">
                    <span class="emoji">😕</span>
                    <p>Confuso</p>
                </div>
            </div>

            <div class="journal-entry">
                <label for="emotion-notes">Como foi seu dia?</label>
                <textarea id="emotion-notes" placeholder="Escreva sobre como você está se sentindo e o que aconteceu hoje..."></textarea>
                
                <button id="save-entry" class="highlight-link">Salvar Diário</button>
            </div>
        </section>

        <section class="emotion-history">
            <h2>Seu Histórico de Emoções</h2>
            <div id="history-container">
                <p id="no-entries">Nenhuma entrada registrada ainda.</p>
                <!-- Histórico será adicionado aqui dinamicamente -->
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2025 Centro Social Cesmar</p>
    </footer>

    <script src="script.js"></script>
    <script>
        // Carregar entradas salvas do diário
        function loadJournalEntries() {
            const entries = JSON.parse(localStorage.getItem('emotionJournal')) || [];
            const container = document.getElementById('history-container');
            
            if (entries.length > 0) {
                document.getElementById('no-entries').style.display = 'none';
                container.innerHTML = '';
                
                entries.forEach(entry => {
                    const entryElement = document.createElement('div');
                    entryElement.classList.add('journal-history-item');
                    entryElement.innerHTML = `
                        <div class="history-header">
                            <h3>${entry.date}</h3>
                            <span class="emotion-emoji">${getEmojiForEmotion(entry.emotion)}</span>
                        </div>
                        <p>${entry.note}</p>
                    `;
                    container.appendChild(entryElement);
                });
            }
        }

        function getEmojiForEmotion(emotion) {
            const emojiMap = {
                'feliz': '😊',
                'triste': '😢',
                'ansioso': '😰',
                'calmo': '😌',
                'irritado': '😠',
                'confuso': '😕'
            };
            return emojiMap[emotion] || '🤔';
        }

        // Salvar entrada no diário
        document.getElementById('save-entry').addEventListener('click', function() {
            const selectedEmotion = document.querySelector('.emotion-option.selected');
            const note = document.getElementById('emotion-notes').value;
            
            if (!selectedEmotion) {
                alert('Por favor, selecione uma emoção.');
                return;
            }
            
            if (!note.trim()) {
                alert('Por favor, escreva algo sobre seu dia.');
                return;
            }
            
            const emotion = selectedEmotion.getAttribute('data-emotion');
            const date = new Date().toLocaleDateString('pt-BR', {
                day: '2-digit',
                month: 'long',
                year: 'numeric'
            });
            
            const newEntry = {
                emotion: emotion,
                note: note,
                date: date
            };
            
            // Carregar entradas existentes
            let entries = JSON.parse(localStorage.getItem('emotionJournal')) || [];
            
            // Adicionar nova entrada
            entries.unshift(newEntry);
            
            // Salvar no localStorage (limitar a 20 entradas)
            entries = entries.slice(0, 20);
            localStorage.setItem('emotionJournal', JSON.stringify(entries));
            
            // Atualizar a exibição
            loadJournalEntries();
            
            // Limpar formulário
            document.querySelectorAll('.emotion-option').forEach(option => {
                option.classList.remove('selected');
            });
            document.getElementById('emotion-notes').value = '';
            
            alert('Entrada salva com sucesso!');
        });

        // Selecionar emoção
        document.querySelectorAll('.emotion-option').forEach(option => {
            option.addEventListener('click', function() {
                document.querySelectorAll('.emotion-option').forEach(opt => {
                    opt.classList.remove('selected');
                });
                this.classList.add('selected');
            });
        });

        // Carregar entradas ao carregar a página
        window.addEventListener('load', loadJournalEntries);
    </script>
    
    <style>
        .emotion-journal {
            margin: 20px 0;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
        }
        
        .emotion-selector {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin: 20px 0;
        }
        
        .emotion-option {
            width: 80px;
            text-align: center;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .emotion-option:hover {
            border-color: #4a6fa5;
            background-color: #e9ecef;
        }
        
        .emotion-option.selected {
            border-color: #4a6fa5;
            background-color: #d0e0f0;
            transform: scale(1.05);
        }
        
        .emotion-option .emoji {
            font-size: 24px;
            display: block;
            margin-bottom: 5px;
        }
        
        .journal-entry {
            margin-top: 20px;
        }
        
        .journal-entry label {
            display: block;
            margin-bottom: 10px;
            font-weight: bold;
        }
        
        .journal-entry textarea {
            width: 100%;
            height: 120px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            resize: vertical;
        }
        
        .emotion-history {
            margin-top: 30px;
        }
        
        .journal-history-item {
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
        }
        
        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .history-header h3 {
            margin: 0;
            color: #4a6fa5;
        }
        
        .history-header .emotion-emoji {
            font-size: 24px;
        }
    </style>
</body>
</html>
